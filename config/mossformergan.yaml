# ==========================================
# MossFormerGAN_SE_16K Configuration
# ==========================================

# Data Configuration
data:
  input_path: "data/clean_trainset_28spk_wav"
  tr_list: "data/train.scp"
  cv_list: "data/test.scp"
  sampling_rate: 16000
  max_length: 4.0      # Maximum length of audio segments in seconds
  batch_size: 6
  num_workers: 4

# Network / Dataloader Identification
network:
  name: "MossFormerGAN_SE_16K"

# Model Configuration (MossFormer Generator)
model:
  in_channels: 1
  out_channels: 1
  hidden_channels: 192   
  num_blocks: 3           

# Training Hyperparameters
training:
  epochs: 50
  lr_g: 0.001          # Generator learning rate
  lr_d: 0.001          # Discriminator learning rate
  log_dir: "runs/MossFormerGAN"
  scheduler_gamma: 0.999  # ExponentialLR decay factor

# Loss Weighting
loss:
  l1_weight: 45.0      # L1 Reconstruction Loss Weight
  si_snr_weight: 1.0   # SI-SNR Loss Weight

# Distributed Training (DDP) Settings
distributed:
  use_ddp: false
  world_size: 1
  local_rank: 0
